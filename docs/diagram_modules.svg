<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 780 580" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
<title>Dungeon module block view</title>
<desc>Nine strictly layered static libraries plus the executable, with dependencies flowing downward only. Main depends on Game; Game on UI, Audio, Animation, Graphics; UI on Graphics and Platform; Graphics on Platform and Assets; everything ultimately on Core. AssetBaker is an offline tool that produces the assets.</desc>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0 0 L10 5 L0 10 z" fill="var(--color-border-secondary, #6b6b6b)"/>
</marker>
<style>
.box{rx:9;ry:9;stroke:var(--color-border-secondary,#7a7a7a);stroke-width:1.5;}
.t{fill:var(--color-text-primary,#ececec);font-size:15px;font-weight:600;}
.s{fill:var(--color-text-secondary,#9a9a9a);font-size:10.5px;}
.lbl{fill:var(--color-text-secondary,#9a9a9a);font-size:11px;}
.dep{stroke:var(--color-border-secondary,#6b6b6b);stroke-width:1.3;fill:none;marker-end:url(#ar);}
.fillA{fill:var(--color-background-secondary,rgba(120,140,200,0.10));}
.fillB{fill:var(--color-background-secondary,rgba(120,200,160,0.08));}
.fillCore{fill:var(--color-background-secondary,rgba(200,170,110,0.12));}
.tier{fill:var(--color-text-info,#8aa6d6);font-size:10px;opacity:.8;}
</style>
</defs>

<g class="dep">
<path d="M390 70 L390 96"/>
<path d="M330 150 L150 188"/>
<path d="M372 150 L300 188"/>
<path d="M408 150 L470 188"/>
<path d="M450 150 L600 250"/>
<path d="M120 232 L120 270"/>
<path d="M150 232 L150 350"/>
<path d="M470 232 L640 350"/>
<path d="M300 232 L600 350"/>
<path d="M560 294 L210 350"/>
<path d="M620 294 L640 350"/>
<path d="M150 394 L330 452"/>
<path d="M640 394 L450 452"/>
</g>

<rect class="box fillA" x="300" y="26" width="180" height="44"/>
<text class="t" x="390" y="46" text-anchor="middle">Main</text>
<text class="s" x="390" y="61" text-anchor="middle">exe · wWinMain · frame loop</text>

<rect class="box fillA" x="270" y="106" width="240" height="44"/>
<text class="t" x="390" y="126" text-anchor="middle">Game</text>
<text class="s" x="390" y="141" text-anchor="middle">map · party · world sim · HUD · states</text>

<rect class="box fillB" x="60" y="188" width="160" height="44"/>
<text class="t" x="140" y="208" text-anchor="middle">UI</text>
<text class="s" x="140" y="223" text-anchor="middle">retained controls</text>

<rect class="box fillB" x="232" y="188" width="150" height="44"/>
<text class="t" x="307" y="208" text-anchor="middle">Audio</text>
<text class="s" x="307" y="223" text-anchor="middle">XAudio2</text>

<rect class="box fillB" x="394" y="188" width="160" height="44"/>
<text class="t" x="474" y="208" text-anchor="middle">Animation</text>
<text class="s" x="474" y="223" text-anchor="middle">skeletons · skinning</text>

<rect class="box fillB" x="500" y="250" width="200" height="44"/>
<text class="t" x="600" y="270" text-anchor="middle">Graphics</text>
<text class="s" x="600" y="285" text-anchor="middle">D3D12 renderer · sprite batch</text>

<rect class="box fillB" x="60" y="350" width="180" height="44"/>
<text class="t" x="150" y="370" text-anchor="middle">Platform</text>
<text class="s" x="150" y="385" text-anchor="middle">Win32 window · input</text>

<rect class="box fillB" x="550" y="350" width="180" height="44"/>
<text class="t" x="640" y="370" text-anchor="middle">Assets</text>
<text class="s" x="640" y="385" text-anchor="middle">glTF · image · WAV</text>

<rect class="box fillCore" x="300" y="452" width="180" height="44"/>
<text class="t" x="390" y="472" text-anchor="middle">Core</text>
<text class="s" x="390" y="487" text-anchor="middle">log · math · time · loc</text>

<rect class="box" x="60" y="452" width="180" height="44" stroke-dasharray="5 4"/>
<text class="t" x="150" y="472" text-anchor="middle">AssetBaker</text>
<text class="s" x="150" y="487" text-anchor="middle">offline · bakes assets/</text>
<path d="M155 452 C170 430 230 420 300 472" class="dep" stroke-dasharray="5 4"/>

<text class="lbl" x="40" y="540">Arrows point from a module to what it depends on. Dashed = offline tool, not linked into the game.</text>
</svg>

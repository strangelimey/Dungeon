<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 780 700" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif" role="img">
<title>Dungeon per-frame loop</title>
<desc>One iteration of the main loop. timer.Tick gives dt; Game::Update runs the state machine (console and map overlay intercept input while the world keeps simulating); DungeonWorld::Update advances party, monsters, lights and shadow-slot assignment, camera, and fire particles; then Game::Render does shadow maps and the scene pass when a scene is visible, followed by a single 2D sprite pass; device.EndFrame presents and the loop repeats unless quit was requested.</desc>
<defs>
<marker id="a4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
<path d="M0 0 L10 5 L0 10 z" fill="var(--color-border-secondary, #6b6b6b)"/>
</marker>
<style>
.b{rx:8;ry:8;stroke:var(--color-border-secondary,#7a7a7a);stroke-width:1.4;}
.t{fill:var(--color-text-primary,#ececec);font-size:13px;font-weight:600;}
.s{fill:var(--color-text-secondary,#cfcfcf);font-size:10px;}
.fl{stroke:var(--color-border-secondary,#6b6b6b);stroke-width:1.3;fill:none;marker-end:url(#a4);}
.flLoop{stroke:var(--color-text-info,#8aa6d6);stroke-width:1.5;fill:none;marker-end:url(#a4);stroke-dasharray:5 4;}
.upd{fill:var(--color-background-secondary,rgba(120,140,200,0.10));}
.wrl{fill:var(--color-background-secondary,rgba(120,200,160,0.08));}
.rnd{fill:var(--color-background-secondary,rgba(200,170,110,0.10));}
.sub{stroke:var(--color-border-tertiary,#555);stroke-width:1.2;rx:7;ry:7;fill:none;stroke-dasharray:4 3;}
.lab{fill:var(--color-text-info,#8aa6d6);font-size:10.5px;font-weight:600;}
</style>
</defs>

<rect x="0" y="0" width="780" height="700" fill="var(--color-background-primary,#15151b)"/>

<rect class="b" x="320" y="16" width="140" height="36"/>
<text class="t" x="390" y="39" text-anchor="middle">timer.Tick → dt</text>
<path class="fl" d="M390 52 L390 72"/>

<rect class="sub" x="30" y="78" width="720" height="186"/>
<text class="lab" x="42" y="96">Game::Update (state machine)</text>

<rect class="b upd" x="300" y="104" width="180" height="34"/>
<text class="s" x="390" y="125" text-anchor="middle">apply language · UpdateFonts</text>
<path class="fl" d="M390 138 L390 154"/>

<rect class="b upd" x="300" y="156" width="180" height="34"/>
<text class="s" x="390" y="177" text-anchor="middle">console? overlay input</text>

<path class="fl" d="M300 173 L120 173 L120 208"/>
<path class="fl" d="M480 173 L660 173 L660 208"/>
<path class="fl" d="M390 190 L390 208"/>

<rect class="b upd" x="40" y="210" width="170" height="44"/>
<text class="s" x="125" y="230" text-anchor="middle">Loading / Menu /</text>
<text class="s" x="125" y="245" text-anchor="middle">LoadingGame loaders</text>

<rect class="b upd" x="305" y="210" width="170" height="44"/>
<text class="s" x="390" y="230" text-anchor="middle">Paused / Sheet</text>
<text class="s" x="390" y="245" text-anchor="middle">overlay page input</text>

<rect class="b upd" x="575" y="210" width="170" height="44"/>
<text class="s" x="660" y="230" text-anchor="middle">Playing</text>
<text class="s" x="660" y="245" text-anchor="middle">map? hud → world</text>

<path class="fl" d="M660 254 L660 280 L390 280 L390 296"/>

<rect class="sub" x="30" y="300" width="720" height="120"/>
<text class="lab" x="42" y="318">DungeonWorld::Update</text>

<rect class="b wrl" x="48" y="330" width="150" height="74"/>
<text class="s" x="123" y="362" text-anchor="middle">party</text>
<text class="s" x="123" y="378" text-anchor="middle">HandleInput + Update</text>
<rect class="b wrl" x="214" y="330" width="150" height="74"/>
<text class="s" x="289" y="362" text-anchor="middle">UpdateMonsters</text>
<text class="s" x="289" y="378" text-anchor="middle">animate · face · announce</text>
<rect class="b wrl" x="380" y="330" width="178" height="74"/>
<text class="s" x="469" y="356" text-anchor="middle">UpdateLights</text>
<text class="s" x="469" y="372" text-anchor="middle">torch · fire flicker · glow</text>
<text class="s" x="469" y="388" text-anchor="middle">→ AssignShadowSlots</text>
<rect class="b wrl" x="574" y="330" width="158" height="74"/>
<text class="s" x="653" y="356" text-anchor="middle">UpdateCamera</text>
<text class="s" x="653" y="378" text-anchor="middle">fire particles + sort</text>
<path class="fl" d="M198 367 L212 367"/>
<path class="fl" d="M364 367 L378 367"/>
<path class="fl" d="M558 367 L572 367"/>

<path class="fl" d="M390 420 L390 440"/>
<rect class="b" x="290" y="442" width="200" height="34"/>
<text class="t" x="390" y="464" text-anchor="middle">device.BeginFrame → list</text>
<path class="fl" d="M390 476 L390 492"/>

<rect class="sub" x="30" y="496" width="720" height="118"/>
<text class="lab" x="42" y="514">Game::Render</text>

<rect class="b rnd" x="48" y="524" width="150" height="74"/>
<text class="s" x="123" y="556" text-anchor="middle">NewFrame</text>
<text class="s" x="123" y="572" text-anchor="middle">renderer/sprite/world</text>

<rect class="b rnd" x="214" y="524" width="160" height="74"/>
<text class="s" x="294" y="550" text-anchor="middle">RenderShadowMaps</text>
<text class="s" x="294" y="566" text-anchor="middle">cached cubes,</text>
<text class="s" x="294" y="582" text-anchor="middle">re-render if dirty</text>

<rect class="b rnd" x="390" y="524" width="170" height="74"/>
<text class="s" x="475" y="550" text-anchor="middle">RenderScene</text>
<text class="s" x="475" y="566" text-anchor="middle">frustum ViewCull →</text>
<text class="s" x="475" y="582" text-anchor="middle">geometry + particles</text>

<rect class="b rnd" x="576" y="524" width="156" height="74"/>
<text class="s" x="654" y="550" text-anchor="middle">2D pass</text>
<text class="s" x="654" y="566" text-anchor="middle">HUD / overlays /</text>
<text class="s" x="654" y="582" text-anchor="middle">menu / map / console</text>
<path class="fl" d="M198 561 L212 561"/>
<path class="fl" d="M374 561 L388 561"/>
<path class="fl" d="M560 561 L574 561"/>
<text class="s" x="240" y="516" fill="var(--color-text-secondary,#cfcfcf)" font-style="italic">scene only if visible (not editor)</text>

<path class="fl" d="M390 614 L390 632"/>
<rect class="b" x="285" y="634" width="210" height="34"/>
<text class="t" x="390" y="656" text-anchor="middle">EndFrame → present · QuitRequested?</text>

<path class="flLoop" d="M495 651 L740 651 L740 34 L460 34"/>
<text class="lab" x="748" y="340" text-anchor="end" transform="rotate(90 748 340)">next frame</text>
</svg>

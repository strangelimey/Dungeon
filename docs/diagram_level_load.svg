<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 780 660" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif" role="img">
<title>Dungeon level load pipeline</title>
<desc>When the player first starts or loads a game, BuildGameLoadTasks queues DungeonWorld load tasks plus portraits and HUD, state becomes LoadingGame. Each task runs one frame behind the progress screen: blocks, surface textures, dungeon meshes, pillar, monsters, decorations, fires, dust, portraits, HUD. When the queue drains the game either applies a pending save or starts new, then enters Playing.</desc>
<defs>
<marker id="a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
<path d="M0 0 L10 5 L0 10 z" fill="var(--color-border-secondary, #6b6b6b)"/>
</marker>
<style>
.b{rx:8;ry:8;stroke:var(--color-border-secondary,#7a7a7a);stroke-width:1.4;}
.t{fill:var(--color-text-primary,#ececec);font-size:13px;font-weight:600;}
.s{fill:var(--color-text-secondary,#9a9a9a);font-size:10px;}
.fl{stroke:var(--color-border-secondary,#6b6b6b);stroke-width:1.3;fill:none;marker-end:url(#a3);}
.task{fill:var(--color-background-secondary,rgba(120,200,160,0.08));}
.f1{fill:var(--color-background-secondary,rgba(120,140,200,0.10));}
.fend{fill:var(--color-background-secondary,rgba(200,170,110,0.12));}
.phase{fill:var(--color-text-info,#8aa6d6);font-size:11px;font-weight:600;}
.note{fill:var(--color-text-secondary,#9a9a9a);font-size:10px;font-style:italic;}
</style>
</defs>

<rect class="b f1" x="220" y="20" width="340" height="50"/>
<text class="t" x="390" y="40" text-anchor="middle">Start New Game / Load (cold start)</text>
<text class="s" x="390" y="58" text-anchor="middle">BuildGameLoadTasks → state = LoadingGame</text>
<path class="fl" d="M390 70 L390 90"/>

<text class="phase" x="40" y="106">staged tasks — one frame each, behind the descending-progress screen</text>

<rect class="b task" x="40" y="118" width="340" height="46"/>
<text class="t" x="56" y="138">load.blocks</text>
<text class="s" x="56" y="155">worn block meshes per variant @ mesh tier</text>
<rect class="b task" x="400" y="118" width="340" height="46"/>
<text class="t" x="416" y="138">surface textures (per material)</text>
<text class="s" x="416" y="155">albedo sRGB + normal + ORM · res→2k fallback</text>

<rect class="b task" x="40" y="178" width="340" height="46"/>
<text class="t" x="56" y="198">load.dungeon — BuildDungeonMeshes</text>
<text class="s" x="56" y="215">geometry → spatial chunks → gfx::Mesh upload</text>
<rect class="b task" x="400" y="178" width="340" height="46"/>
<text class="t" x="416" y="198">load.pillar</text>
<text class="s" x="416" y="215">model · mesh · animator · texture set</text>

<rect class="b task" x="40" y="238" width="340" height="46"/>
<text class="t" x="56" y="258">load.monsters</text>
<text class="s" x="56" y="275">model/mesh/tex per kind · animator per spawn</text>
<rect class="b task" x="400" y="238" width="340" height="46"/>
<text class="t" x="416" y="258">load.decorations</text>
<text class="s" x="416" y="275">shared model per type · placed + wall-mounted</text>

<rect class="b task" x="40" y="298" width="340" height="46"/>
<text class="t" x="56" y="318">load.fires</text>
<text class="s" x="56" y="335">sconce/brazier mesh+tex · ParticleBatch · BuildFires</text>
<rect class="b task" x="400" y="298" width="340" height="46"/>
<text class="t" x="416" y="318">load.dust — BuildTurbidityMap</text>
<text class="s" x="416" y="335">per-cell density grid texture</text>

<rect class="b task" x="40" y="358" width="340" height="46"/>
<text class="t" x="56" y="378">load.portraits</text>
<text class="s" x="56" y="395">per-member bust textures</text>
<rect class="b task" x="400" y="358" width="340" height="46"/>
<text class="t" x="416" y="378">load.hud — GameUI::BuildHud</text>
<text class="s" x="416" y="395">party bar · panels · control panel · log</text>

<path class="fl" d="M390 404 L390 426"/>

<polygon points="390,432 470,470 390,508 310,470" class="b f1"/>
<text class="t" x="390" y="474" text-anchor="middle">queue done</text>

<path class="fl" d="M310 470 L150 470 L150 500"/>
<path class="fl" d="M470 470 L630 470 L630 500"/>

<rect class="b task" x="40" y="510" width="220" height="56"/>
<text class="t" x="150" y="532" text-anchor="middle">pending save?</text>
<text class="s" x="150" y="551" text-anchor="middle">LoadGame: reset + apply state</text>

<rect class="b task" x="520" y="510" width="220" height="56"/>
<text class="t" x="630" y="532" text-anchor="middle">new game</text>
<text class="s" x="630" y="551" text-anchor="middle">reset world + roster</text>

<path class="fl" d="M150 566 L150 590 L390 590 L390 608"/>
<path class="fl" d="M630 566 L630 590 L390 590"/>

<rect class="b fend" x="290" y="610" width="200" height="40"/>
<text class="t" x="390" y="635" text-anchor="middle">state = Playing</text>
</svg>
